name: Catalog maintenance

# Weekly editorial review: flags overlapping / near-duplicate posts and suggests
# low-value posts to archive, reporting to Telegram. Archiving is human-confirmed
# (Archive button → Pages Function sets `archived: true`). Nothing auto-deletes.
# Also runnable on demand from the Actions tab.

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci

      - name: Review catalog + notify
        working-directory: pipeline
        run: npx tsx src/maintenance.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
