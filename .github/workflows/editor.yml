name: Daily editor

# The autonomous editor-in-chief: once a day it reviews the catalog and takes
# the single highest-value action (new post / improve / archive / skip),
# pushes the result (Cloudflare Pages rebuilds on push), and reports to
# Telegram with a plain informational message. See pipeline/src/editor.ts.

on:
  schedule:
    - cron: '17 13 * * *' # daily, 13:17 UTC (off-peak minute)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no push, no Telegram)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: editor
  cancel-in-progress: false

jobs:
  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Decide + act + notify
        working-directory: pipeline
        run: npx tsx src/editor.ts
        env:
          # Subscription auth (Claude Max) — generated once with `claude setup-token`.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
          SITE_URL: ${{ vars.SITE_URL }}
          EDITOR_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_OWNER_ID}" \
            --data-urlencode text="⚠️ Daily editor failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
