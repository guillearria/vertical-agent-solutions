name: Daily editor

# The autonomous editor-in-chief: once a day it reviews the catalog and takes
# the single highest-value action (new post / improve / archive / skip),
# pushes the result (Cloudflare Pages rebuilds on push), and reports to
# Telegram with an Undo button. See pipeline/src/editor.ts.

on:
  schedule:
    - cron: '17 13 * * *' # daily, 13:17 UTC (off-peak minute)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no push, no KV writes, no Telegram)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: editor
  cancel-in-progress: false

jobs:
  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci

      - name: Decide + act + notify
        working-directory: pipeline
        run: npx tsx src/editor.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL }}
          EDITOR_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
